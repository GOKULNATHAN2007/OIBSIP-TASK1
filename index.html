<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Infobyte Internship Projects</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 20px;
        }

        .container{
            background: #fff;
            width: 90%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            color: #333;
            margin-bottom: 10px;
        }

        p{
            color: #666;
            margin-bottom: 30px;
        }

        .task-links{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-links a{
            text-decoration: none;
            background: #4facfe;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .task-links a:hover{
            background: #007bff;
            transform: translateY(-3px);
        }

        footer{
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌟 Oasis Infobyte Internship Projects</h1>

            </a>
        </div>

        <footer>
